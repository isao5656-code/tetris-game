<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="board-panel">
        <canvas id="board" width="300" height="600" aria-label="Tetris board"></canvas>
      </section>

      <aside class="side-panel">
        <h1>Tetris</h1>
        <div class="card">
          <p class="label">Score</p>
          <p id="score" class="value">0</p>
        </div>
        <div class="card">
          <p class="label">Lines</p>
          <p id="lines" class="value">0</p>
        </div>
        <div class="card">
          <p class="label">Level</p>
          <p id="level" class="value">1</p>
        </div>

        <div class="card">
          <p class="label">Next</p>
          <canvas id="next" width="120" height="120"></canvas>
        </div>

        <div class="card">
          <p class="label">操作</p>
          <ul>
            <li>← / → : 移動</li>
            <li>↑ : 回転</li>
            <li>↓ : ソフトドロップ</li>
            <li>Space : ハードドロップ</li>
            <li>P : 一時停止</li>
            <li>R : リスタート</li>
          </ul>
        </div>
      </aside>
    </main>

    <div id="overlay" class="overlay hidden" role="status" aria-live="polite">
      <div class="overlay-card">
        <h2 id="overlay-title">Game Over</h2>
        <p id="overlay-sub">R を押してリスタート</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
